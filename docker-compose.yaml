version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: plantvita_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: plantvita_backend
    restart: always
    volumes:
      - ./backend:/app/backend
    working_dir: /app/backend
    command: tail -f /dev/null
    ports:
      - "${SERVER_PORT}:8000"
    env_file:
      - .env
    environment:
      VISION_SERVICE_URL: ${VISION_SERVICE_URL:-http://host.docker.internal:8001}
      VISION_INFERENCE_KEY: ${VISION_INFERENCE_KEY:-}
      VISION_TIMEOUT: ${VISION_TIMEOUT:-60}
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: UTF-8
      GEMINI_KEY: ${GEMINI_KEY}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: "http://localhost:${FRONTEND_PORT},http://127.0.0.1:${FRONTEND_PORT}"
    tty: true
    stdin_open: true
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:                                      
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: plantvita_frontend
    restart: always
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
      - /app/frontend/.next
    working_dir: /app/frontend
    command: tail -f /dev/null
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      WATCHPACK_POLLING: "true"
      BACKEND_URL: http://backend:8000
      NEXTAUTH_URL: http://localhost:${FRONTEND_PORT}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      API_SECRET_KEY: ${API_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - backend

  adminer:
    image: adminer
    container_name: plantvita_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: